name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          
      - name: Get dependencies
        run: flutter pub get
        
      - name: Show Flutter version
        run: flutter --version
        
      - name: Show Flutter doctor
        run: flutter doctor
        
      - name: Build debug APK
        run: flutter build apk --debug || flutter build apk --debug --verbose
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: studygame-debug.apk
          path: build/app/outputs/flutter-apk/app-debug.apk